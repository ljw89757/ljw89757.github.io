</span><br><span class="line">torch.matmul(<span class="built_in">input</span>, other, *, out=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 执行矩阵与矩阵的乘法操作</span></span><br><span class="line">torch.mm(mat1, mat2) -&gt; Tensor</span><br><span class="line"><span class="comment"># 计算两个一维张量的点积</span></span><br><span class="line">torch.dot(tensor1, tensor2) -&gt; Tensor</span><br><span class="line"><span class="comment"># 执行矩阵与向量的乘法操作</span></span><br><span class="line">torch.mv(mat, vec, out=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 创建全零张量</span></span><br><span class="line">torch.zeros(*size, out=<span class="literal">None</span>, dtype=<span class="literal">None</span>, layout=torch.strided, device=<span class="literal">None</span>, requires_grad=<span class="literal">False</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 创建全一张量</span></span><br><span class="line">torch.ones(*size, out=<span class="literal">None</span>, dtype=<span class="literal">None</span>, layout=torch.strided, device=<span class="literal">None</span>, requires_grad=<span class="literal">False</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 创建等差数列</span></span><br><span class="line">torch.arange(start=<span class="number">0</span>, end, step=<span class="number">1</span>, dtype=<span class="literal">None</span>, layout=torch.strided, device=<span class="literal">None</span>, requires_grad=<span class="literal">False</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 计算张量中每个元素的指数值</span></span><br><span class="line">torch.exp(<span class="built_in">input</span>, out=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 沿着指定的维度对张量进行拼接</span></span><br><span class="line">torch.cat(tensors, dim=<span class="number">0</span>, out=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 创建一个与输入张量形状相同，并且所有元素都为零的新张量</span></span><br><span class="line">torch.zeros_like(<span class="built_in">input</span>, dtype=<span class="literal">None</span>, layout=<span class="literal">None</span>, device=<span class="literal">None</span>, requires_grad=<span class="literal">False</span>, memory_format=torch.preserve_format) -&gt; Tensor</span><br><span class="line"><span class="comment"># 计算张量元素之和</span></span><br><span class="line">torch.<span class="built_in">sum</span>(<span class="built_in">input</span>, dim=<span class="literal">None</span>, keepdim=<span class="literal">False</span>, dtype=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 计算张量的范数</span></span><br><span class="line">torch.norm(<span class="built_in">input</span>, p=<span class="string">&#x27;fro&#x27;</span>, dim=<span class="literal">None</span>, keepdim=<span class="literal">False</span>, out=<span class="literal">None</span>, dtype=<span class="literal">None</span>) -&gt; Tensor</span><br><span class="line"><span class="comment"># 计算张量各元素的绝对值</span></span><br><span class="line">torch.<span class="built_in">abs</span>(<span class="built_in">input</span>, out=<span class="literal">None</span>) -&gt; Tensor</span><br></pre></td></tr></table></figure>
